<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>404 — الصفحة غير موجودة | DZ Web Team</title>
  <link rel="icon" href="/favicon.svg" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0 }
    :root {
      --bg: #020617; --surface: #0f172a; --border: rgba(255,255,255,.06);
      --cyan: #22d3ee; --cyan-dim: rgba(34,211,238,.15);
      --text: #e2e8f0; --muted: #64748b;
      --font: 'Cairo', 'Segoe UI', system-ui, sans-serif;
    }
    html { background: var(--bg); color: var(--text); font-family: var(--font);
           height: 100%; scroll-behavior: smooth }
    body { min-height: 100%; display: flex; flex-direction: column;
           align-items: center; justify-content: center; padding: 2rem;
           background: radial-gradient(ellipse 60% 50% at 50% 0%, rgba(34,211,238,.07) 0%, transparent 70%),
                       var(--bg) }
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&display=swap');
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 1.5rem;
      padding: 3.5rem 2.5rem;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 0 60px -20px rgba(34,211,238,.2);
    }
    .code {
      font-size: 7rem; font-weight: 800; line-height: 1;
      background: linear-gradient(135deg, var(--cyan), #818cf8);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    h1 { margin: .75rem 0 .5rem; font-size: 1.5rem; font-weight: 700; color: var(--text) }
    p  { color: var(--muted); line-height: 1.7; font-size: .95rem }
    .actions { display: flex; gap: .75rem; justify-content: center; margin-top: 2rem; flex-wrap: wrap }
    .btn {
      display: inline-flex; align-items: center; gap: .4rem;
      padding: .65rem 1.4rem; border-radius: .6rem; font-family: var(--font);
      font-size: .9rem; font-weight: 600; cursor: pointer; text-decoration: none;
      transition: all .2s ease;
    }
    .btn-primary {
      background: var(--cyan); color: var(--bg);
      border: 1px solid var(--cyan);
    }
    .btn-primary:hover { background: #67e8f9; transform: translateY(-2px);
                         box-shadow: 0 8px 20px -6px rgba(34,211,238,.5) }
    .btn-ghost {
      background: transparent; color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { background: var(--cyan-dim); border-color: rgba(34,211,238,.3) }
  </style>
</head>
<body>
  <div class="card">
    <div class="code">404</div>
    <h1>الصفحة غير موجودة</h1>
    <p>يبدو أنك تهت في الفضاء الرقمي الشاسع. الصفحة التي تبحث عنها غير موجودة أو تم نقلها.</p>
    <div class="actions">
      <a href="/" class="btn btn-primary">← العودة للرئيسية</a>
      <a href="/#contact" class="btn btn-ghost">تواصل معنا</a>
    </div>
  </div>
</body>
</html>
